<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    
    <!-- ORBITRON e LATO FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    
    <!-- BOOTSRAP CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
    <!-- SWIPER -->
    <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />
    
    <!-- CSS ESTERNO -->
    <link rel="stylesheet" href="Presto.css">
</head>
<body>
    <!-- NAVBAR  -->
     
    <nav class="navbar bg-black navbar-expand-lg">
        <div class="container-fluid ">
            <a class="navbar-brand ps-3 ps-lg-0" href="#"><img src="./MEDIA/logo.png" alt="" class="logo logoNavbar"></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse bg-black ps-3 ps-lg-0" id="navbarSupportedContent">
                <ul class="navbar-nav w-100 mb-2 mb-lg-0 ms-lg-3">
                    <li class="nav-item ">
                        <a class="nav-link text-yl " aria-current="page" href="Presto.html">Home</a>
                    </li>
                    <li class="nav-item mx-lg-auto">
                        <a class="nav-link text-yl" href="annunci.html" target="_blank">Annunci</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-yl " aria-disabled="true">Chi siamo</a>
                    </li>
                </ul>
                <div class="logo"></div>
            </div>
        </div>
    </nav>
    
    <main>
        
        <header class="container-fluid mt-3 ">
            <div class="row w-100">
                <div class="col-11 d-flex justify-content-start align-items-center">
                    <h1 class="text-yl">Pagina degli annunci</h1>
                </div>
            </div>
        </header>
        <section class="container-fluid w-100">
            <div class="row w-100">
                
                
                <div class="col-12 col-md-3">
                    <p class="h2 text-yl mx-3">Filtra per:</p>
                    <div class="accordion mx-3 " id="accordionExample">
                        <div class="accordion-item">
                            <h2 class="accordion-header">
                                <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne" aria-expanded="true" aria-controls="collapseOne">
                                    Categorie
                                </button>
                            </h2>
                            <div id="collapseOne" class="accordion-collapse collapse show" data-bs-parent="#accordionExample">
                                <div class="accordion-body wrapperAcc">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="radioDefault" id="All" checked>
                                        <label class="form-check-label" for="radioDefault1">
                                            Tutte le categorie
                                        </label>
                                    </div>
                                    
                                </div>
                            </div>
                        </div>
                        <div class="accordion-item">
                            <h2 class="accordion-header">
                                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseTwo" aria-expanded="false" aria-controls="collapseTwo">
                                    Prezzo
                                </button>
                            </h2>
                            <div id="collapseTwo" class="accordion-collapse collapse" data-bs-parent="#accordionExample">
                                <div class="accordion-body">
                                    <div class="form-check">
                                        <input type="range" id="price" min="0" class="w-100">
                                        <div class="d-flex">
                                            <p class="h4 text-yl prezzo"></p>
                                            <p class="h4 text-yl">$</p>
                                        </div>
                                    </div>
                                    
                                </div>
                            </div>
                        </div>
                        <div class="accordion-item">
                            <h2 class="accordion-header">
                                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseThree" aria-expanded="false" aria-controls="collapseThree">
                                    Cerca
                                </button>
                            </h2>
                            <div id="collapseThree" class="accordion-collapse collapse" data-bs-parent="#accordionExample">
                                <div class="accordion-body">
                                    <div class="form-check p-0">
                                <input type="text" id="wordInput" class="">
                                      
                                    </div>
                                    
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <article id="cardWrapper" class="col-12 col-md-8 p-0 d-flex flex-wrap justify-content-around justify-content-center">
                    
                </article>
            </div>
        </section>
    </div>
</main>

<!-- BOOTSRAP CSS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

<!-- ICONE FONTAWESOME -->
<script src="https://kit.fontawesome.com/58ae64b951.js" crossorigin="anonymous"></script>

<!-- SWIPER JS -->
<script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>

<!-- JS ESTERNO -->
<script src="annunci.js"></script>
</body>
</html>
